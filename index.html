<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Mix</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:99999;white-space:pre-wrap;';
        errDiv.innerHTML = 'Global Error: ' + message + '\n\n' + (error && error.stack ? error.stack : '');
        document.body.appendChild(errDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style = 'position:fixed;top:50%;left:0;right:0;background:orange;color:white;padding:20px;z-index:99999;white-space:pre-wrap;';
        errDiv.innerHTML = 'Unhandled Promise Rejection: ' + event.reason;
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
