server.port=${PORT:8080}

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:jdbc:mysql://localhost:3306/healthmixdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:sridharank}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:1234}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ============================================
# Brevo Transactional Email API
# Uses HTTPS (port 443) - works on Railway unlike SMTP
# Sends to ANY email (unlike Resend free tier)
# Free tier: 300 emails/day
# Set BREVO_API_KEY as environment variable in Railway
# ============================================
brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:noreply@healthmix.com}
brevo.from.name=${BREVO_FROM_NAME:HealthMix}

# Spring Mail is disabled (using Brevo HTTP API instead)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
