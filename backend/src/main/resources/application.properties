server.port=${PORT:8080}

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:jdbc:mysql://localhost:3306/healthmixdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:sridharank}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:1234}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ============================================
# Resend Transactional Email API
# Uses HTTPS (port 443) - works on Railway unlike SMTP
# Set RESEND_API_KEY as an environment variable in Railway
# Free tier: 3000 emails/month, activates instantly
# ============================================
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Spring Mail is disabled (using Resend HTTP API instead)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
